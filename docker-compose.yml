services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # Override Atlas URL — use local MongoDB container when running via Docker
      MONGODB_URI: mongodb://mongodb:27017/finance_dashboard
    ports:
      - '3001:3000'
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  mongo_data:
